<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web</title>
    
    <!-- ESTILOS CSS (Diseño y colores) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            text-align: center;
            padding: 50px 20px;
        }

        .tarjeta {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2b6cb0;
        }

        button {
            background-color: #319795;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2c7a7b;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>¡Hola Mundo! 👋</h1>
        <p>Esta es mi primera página web estilizada desde GitHub Pages.</p>
        
        <!-- Botón interactivo -->
        <button onclick="saludar()">¡Haz clic aquí!</button>
    </div>

    <!-- CÓDIGO JAVASCRIPT (Interacción) -->
    <script>
        function saludar() {
            alert("¡Felicidades! Lograste programar tu primer botón en JavaScript 🎉");
        }
    </script>

</body>
</html>
